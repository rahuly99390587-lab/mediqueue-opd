<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0369a1" />
  <meta name="description" content="MediQueue - Smart Hospital OPD Management System" />
  <title>MediQueue OPD</title>

  <!-- Google Fonts: Outfit (display) + Plus Jakarta Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              50:  '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            },
            teal: {
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease both',
            'slide-up': 'slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both',
            'pop-in': 'popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
            slideUp: { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            popIn: { from: { opacity: '0', transform: 'scale(0.85)' }, to: { opacity: '1', transform: 'scale(1)' } },
            pulseSoft: { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.6' } },
          },
          boxShadow: {
            'card': '0 1px 3px rgba(0,0,0,0.06), 0 8px 32px rgba(3,105,161,0.06)',
            'card-hover': '0 4px 6px rgba(0,0,0,0.04), 0 16px 48px rgba(3,105,161,0.12)',
            'token': '0 20px 60px rgba(3,105,161,0.25)',
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Input focus ring override */
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #0ea5e9 !important;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.12) !important;
    }

    /* ─── PRINT STYLES ─────────────────────────────────────────────────────── */
    @media print {
      @page {
        size: A4;
        margin: 12mm 15mm;
      }

      /* Hide EVERYTHING on the page */
      body > * { display: none !important; }
      body #root > * { display: none !important; }

      /* Show ONLY the print area */
      .mediqueue-print-area {
        display: block !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        background: white !important;
        color: black !important;
        font-family: 'Plus Jakarta Sans', Arial, sans-serif !important;
        font-size: 12pt !important;
        z-index: 99999 !important;
      }

      .mediqueue-print-area * {
        color: black !important;
        background: transparent !important;
      }

      .no-print { display: none !important; }
    }

    /* Hide print area on screen */
    .mediqueue-print-area { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
